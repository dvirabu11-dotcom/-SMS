name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Capacitor Sync
        run: |
          npx cap sync android
          npx cap update android
          # Fix misconfigured AGP version, SDK version and Java version in the generated files
          # Patch plugins build.gradle
          sed -i 's/gradle:[0-9.]*/gradle:8.2.1/g' android/capacitor-cordova-android-plugins/build.gradle
          sed -i 's/compileSdk = [0-9]*/compileSdk = 34/g' android/capacitor-cordova-android-plugins/build.gradle
          sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 34/g' android/capacitor-cordova-android-plugins/build.gradle
          sed -i 's/minSdkVersion = [0-9]*/minSdkVersion = 19/g' android/capacitor-cordova-android-plugins/build.gradle
          sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' android/capacitor-cordova-android-plugins/build.gradle
          
          # Patch app/capacitor.build.gradle
          sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' android/app/capacitor.build.gradle
          
          # Patch library build.gradle in node_modules as a last resort
          sed -i 's/minSdkVersion 21/minSdkVersion 19/g' node_modules/@capacitor/android/capacitor/build.gradle || true
          sed -i 's/minSdkVersion 24/minSdkVersion 19/g' node_modules/@capacitor/android/capacitor/build.gradle || true
          sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' node_modules/@capacitor/android/capacitor/build.gradle || true
          sed -i 's/gradle:[0-9.]*/gradle:8.2.1/g' node_modules/@capacitor/android/capacitor/build.gradle || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK with Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2.1
          build-root-directory: android
          arguments: assembleDebug -x lint -x test --stacktrace
          cache-read-only: false
          validate-wrappers: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
